<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文指令指认对战</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .score-box {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }
        .score {
            font-size: 24px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 10px;
        }
        #scoreA { background: #e3f2fd; color: #1976d2; }
        #scoreB { background: #fff3e0; color: #f57c00; }
        button {
            padding: 16px;
            font-size: 18px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            width: 100%;
        }
        #btnRandom { background: #2196f3; }
        #btnVoice { background: #9c27b0; }
        #btnAdd { background: #4caf50; }
        #btnSwitch { background: #ff9800; }
        #sentence {
            font-size: 22px;
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            min-height: 60px;
        }
        .current-player {
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h2>英文指令指认对战</h2>
    <div class="current-player">当前玩家：<span id="currentPlayer">A</span></div>
    
    <div class="score-box">
        <div class="score" id="scoreA">玩家A：0</div>
        <div class="score" id="scoreB">玩家B：0</div>
    </div>
    
    <div id="sentence">点击「随机出题」开始</div>
    
    <button id="btnRandom">随机出题</button>
    <button id="btnVoice">听读音</button>
    <button id="btnAdd">答对加分</button>
    <button id="btnSwitch">切换玩家</button>
    <button onclick="window.location.href='index.html'" style="background:#999">返回首页</button>

    <script>
        const questions = [
            "Which one is circle?",
            "Which one is square?",
            "Which one is rectangle?",
            "Which one is star?",
            "Which one is heart?"
        ];
        
        let scoreA = 0, scoreB = 0, currentPlayer = "A", currentText = "";
        
        // 播放蜂鸣音效（100%能用）
        function beep(freq = 800, duration = 0.2) {
            try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = freq;
                gain.gain.value = 0.3;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + duration);
                osc.stop(ctx.currentTime + duration);
                ctx.resume();
            } catch(e) { console.log("音效失败"); }
        }
        
        // 播放英文（尝试系统语音，失败就蜂鸣）
        function speak(text) {
            if (window.speechSynthesis) {
                try {
                    const msg = new SpeechSynthesisUtterance(text);
                    msg.lang = "en-US";
                    msg.rate = 0.8;
                    window.speechSynthesis.speak(msg);
                    beep(600, 0.1);
                    return;
                } catch(e) {}
            }
            // 备用：只响蜂鸣音
            beep(800, 0.3);
            alert("播放: " + text); // 手机震动提示
        }
        
        // 随机出题
        document.getElementById("btnRandom").onclick = () => {
            const idx = Math.floor(Math.random() * questions.length);
            currentText = questions[idx];
            document.getElementById("sentence").innerHTML = currentText;
            beep(500, 0.1);
        };
        
        // 听读音
        document.getElementById("btnVoice").onclick = () => {
            if (currentText) speak(currentText);
            else beep(300, 0.3);
        };
        
        // 加分
        document.getElementById("btnAdd").onclick = () => {
            if (currentPlayer === "A") {
                scoreA++;
                document.getElementById("scoreA").innerHTML = "玩家A：" + scoreA;
            } else {
                scoreB++;
                document.getElementById("scoreB").innerHTML = "玩家B：" + scoreB;
            }
            beep(1000, 0.15);
        };
        
        // 切换玩家
        document.getElementById("btnSwitch").onclick = () => {
            currentPlayer = currentPlayer === "A" ? "B" : "A";
            document.getElementById("currentPlayer").innerHTML = currentPlayer;
            beep(700, 0.1);
        };
        
        // 初始化
        currentText = questions[0];
        document.getElementById("sentence").innerHTML = currentText;
    </script>
</body>
</html>
